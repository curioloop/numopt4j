name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: ['8', '11', '17', '21']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Build and test
        run: mvn -B verify

      - name: Upload JAR
        if: matrix.java == '8'
        uses: actions/upload-artifact@v4
        with:
          name: numopt4j-jar
          path: target/*.jar
